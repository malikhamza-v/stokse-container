upstream api {
    server stokse_server_container:8000;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name api.stokse.com;

    return 301 https://$host$request_uri;  # Redirect all HTTP requests to HTTPS
}

server {
    listen 443 ssl;
    server_name api.stokse.com;

    # Path to your SSL certificate and key
    ssl_certificate /etc/ssl/certs/nginx-api-selfsigned.crt;
    ssl_certificate_key /etc/ssl/private/nginx-api-selfsigned.key;

    ssl_protocols TLSv1.2 TLSv1.3;  # Recommended protocol settings
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Enable SSL session caching for performance
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    location / {
        proxy_pass http://api;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";

        # Timeout settings
        proxy_connect_timeout 60;
        proxy_send_timeout 60;
        proxy_read_timeout 60;
        send_timeout 60;
    }

    location /media/ {
        alias /var/www/django_media/;
        autoindex on;
        add_header Cache-Control "public, max-age=86400";  # Cache for 1 day
        add_header Access-Control-Allow-Origin *;          # Allow CORS for media files
    }

    location /static/ {
        alias /var/www/django_static/;
        autoindex on;
        add_header Cache-Control "public, max-age=86400";  # Cache for 1 day
    }

    # Enable Gzip compression
    gzip on;
    gzip_types text/plain application/xml text/css application/javascript;
    gzip_min_length 256;

    # Timeouts
    keepalive_timeout 65;
    client_max_body_size 50M;
}
